<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE FILES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --black:#080808; --red:#CC0000; --red-hot:#FF1A1A;
      --newsprint:#F5E9C8; --white:#FFFFFF; --muted:rgba(245,233,200,.45);
      --fh:'Anton',sans-serif; --fs:'Bebas Neue',sans-serif; --fb:'IBM Plex Mono',monospace;
    }
    html,body { width:100%; min-height:100%; background:var(--black); color:var(--newsprint);
      font-family:var(--fb); overflow-x:hidden; }
    body::after {
      content:''; position:fixed; inset:0; z-index:9999; pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size:200px; opacity:.55;
    }
    .page { min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:2.5rem 1rem 4rem;
      animation:fadeUp .9s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
    .stamp { display:inline-block; font-size:.5rem; letter-spacing:.35em; text-transform:uppercase;
      color:var(--red); border:1px solid var(--red); padding:.3rem .9rem; margin-bottom:.9rem; }
    h1 { font-family:var(--fh); font-size:clamp(3rem,9vw,7rem); line-height:.88;
      letter-spacing:.03em; color:var(--white); text-transform:uppercase;
      animation:slamIn .45s cubic-bezier(.2,0,.3,1) .3s both; text-align:center; }
    h1 em { color:var(--red); font-style:normal; }
    @keyframes slamIn { from{opacity:0;transform:scale(1.14) translateY(-10px)} to{opacity:1;transform:none} }
    .subtitle { font-size:.55rem; letter-spacing:.28em; text-transform:uppercase;
      color:var(--muted); margin-top:.5rem; text-align:center; }

    /* CHARACTER */
    .char-stage { position:relative; width:260px;
      cursor:pointer; user-select:none; margin:1.8rem 0 0;
      filter:drop-shadow(0 8px 28px rgba(0,0,0,.8)); }
    .char-stage svg { animation:idleBob 2.6s ease-in-out infinite; }
    @keyframes idleBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .eyelid { transform-box:fill-box; transform-origin:50% 0%;
      animation:blink 4.5s ease-in-out infinite; }
    @keyframes blink { 0%,87%,95%,100%{transform:scaleY(0)} 91%{transform:scaleY(1)} }
    #jaw { transform-box:fill-box; transform-origin:50% 0%;
      transition:transform .32s ease-out; }
    .char-stage.open #jaw { transform:translateY(44px) rotate(20deg); }
    .mouth-glow {
      position:absolute; left:50%; top:61%; transform:translate(-50%,-50%);
      width:80px; height:0;
      background:radial-gradient(ellipse,#FF2200 0%,#990000 50%,transparent 100%);
      border-radius:50%; filter:blur(10px); opacity:0; pointer-events:none;
      transition:height .32s ease-out,opacity .25s ease-out; z-index:2;
    }
    .char-stage.open .mouth-glow { height:52px; opacity:1; }
    .click-hint { position:absolute; bottom:-26px; left:50%; transform:translateX(-50%);
      font-size:.48rem; letter-spacing:.3em; text-transform:uppercase;
      color:var(--muted); white-space:nowrap; transition:opacity .3s; }
    .char-stage.open .click-hint { opacity:0; }

    /* BUTTON */
    .open-btn { margin-top:3rem; font-family:var(--fh); font-size:1.4rem;
      letter-spacing:.15em; color:var(--white); background:var(--red); border:none;
      padding:.95rem 2.6rem; cursor:pointer; text-transform:uppercase;
      transition:transform .18s,background .18s; }
    .open-btn:hover { transform:scale(1.04); background:var(--red-hot); }
    .open-btn:active { transform:scale(.97); }
    .source { margin-top:.9rem; font-size:.48rem; letter-spacing:.25em;
      text-transform:uppercase; color:rgba(245,233,200,.22); }
    .source a { color:rgba(204,0,0,.5); text-decoration:none; }
    .source a:hover { color:var(--red); }
    .counter { margin-top:.6rem; font-size:.46rem; letter-spacing:.28em;
      text-transform:uppercase; color:rgba(245,233,200,.16); }

    /* CARD PORTAL — flies out of the mouth */
    .card-portal {
      position:fixed;
      left:var(--mx,50vw); top:var(--my,50vh);
      transform:translate(-50%,-50%) scale(.02) rotate(720deg);
      opacity:0; z-index:200; pointer-events:none;
      width:min(560px,90vw);
    }
    .card-portal.fly-out {
      animation:flyOut .8s cubic-bezier(.12,0,.24,1) forwards;
    }
    .card-portal.landed {
      pointer-events:all;
      transform:translate(-50%,-50%) scale(1) rotate(0deg);
      opacity:1;
      left:50vw; top:50vh;
    }
    @keyframes flyOut {
      0%   { opacity:0; transform:translate(-50%,-50%) scale(.02) rotate(720deg);
             left:var(--mx,50vw); top:var(--my,50vh); }
      30%  { opacity:1; }
      100% { opacity:1; transform:translate(-50%,-50%) scale(1) rotate(0deg);
             left:50vw; top:50vh; }
    }
    .backdrop { position:fixed; inset:0; z-index:199; background:rgba(0,0,0,.82);
      opacity:0; pointer-events:none; transition:opacity .2s; }
    .backdrop.visible { opacity:1; pointer-events:all; }

    /* DOC CARD */
    .doc-card { background:var(--newsprint); color:#080808; border:3px solid var(--red);
      box-shadow:0 0 60px rgba(204,0,0,.5),0 24px 60px rgba(0,0,0,.7); }
    .card-bar { background:var(--red); color:var(--white); font-family:var(--fs);
      font-size:.72rem; letter-spacing:.3em; padding:.45rem 1rem;
      display:flex; justify-content:space-between; align-items:center; }
    .close-btn { background:none; border:none; color:var(--white); font-size:1.1rem;
      cursor:pointer; line-height:1; opacity:.8; }
    .close-btn:hover { opacity:1; }
    .card-body { padding:1.4rem 1.4rem 1.8rem; }
    .eyebrow { font-size:.48rem; letter-spacing:.3em; text-transform:uppercase;
      color:var(--red); margin-bottom:.55rem; }
    .headline { font-family:var(--fh); font-size:clamp(1.3rem,4vw,2.1rem);
      line-height:1; letter-spacing:.02em; color:#080808;
      text-transform:uppercase; margin-bottom:.9rem; min-height:2.2rem; }
    .meta { font-size:.5rem; letter-spacing:.15em; text-transform:uppercase;
      color:rgba(8,8,8,.45); border-top:1px solid rgba(8,8,8,.12);
      padding-top:.65rem; margin-bottom:1rem; display:flex; gap:1.5rem; flex-wrap:wrap; }
    .preview { font-family:'Courier New',monospace; font-size:.75rem;
      line-height:1.7; color:rgba(8,8,8,.72); margin-bottom:1.4rem; }
    .redact { background:#000; color:#000; user-select:none;
      animation:redactPulse 2.8s infinite; border-radius:1px; }
    @keyframes redactPulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    .cta { display:inline-block; font-size:.58rem; letter-spacing:.25em;
      text-transform:uppercase; color:var(--white); background:var(--red);
      padding:.65rem 1.5rem; text-decoration:none; transition:background .18s; }
    .cta:hover { background:var(--red-hot); }

    /* VIDEO CARD */
    .vid-card { background:#0d0d0d; border:3px solid var(--red);
      box-shadow:0 0 60px rgba(204,0,0,.5),0 24px 60px rgba(0,0,0,.8); }
    .vid-thumb { position:relative; aspect-ratio:16/9; background:#000; overflow:hidden; }
    .vid-thumb iframe { width:100%; height:100%; border:none; display:block; }
    .vid-thumb::after { content:''; position:absolute; inset:0; pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px); }
    .vid-body { padding:1.2rem 1.4rem 1.7rem; }
    .vid-title { font-family:var(--fh); font-size:clamp(1.2rem,3.5vw,1.9rem);
      line-height:1.05; color:var(--white); text-transform:uppercase; margin-bottom:.7rem; }
    .vid-meta { font-size:.48rem; letter-spacing:.2em; text-transform:uppercase;
      color:rgba(245,233,200,.3); display:flex; gap:1.5rem; margin-bottom:.9rem; flex-wrap:wrap; }
    .vid-desc { font-size:.68rem; line-height:1.65; color:rgba(245,233,200,.48); margin-bottom:1.2rem; }

    /* ─── MOBILE ─── */
    @media (max-width: 600px) {
      .page { padding:1.4rem .75rem 3rem; }
      h1 { font-size:clamp(2.8rem,15vw,4.5rem); }
      .subtitle { font-size:.48rem; letter-spacing:.2em; }

      /* character scales to fit screen */
      .char-stage { width:min(200px,72vw); height:auto; margin:1.2rem 0 0;
        filter:drop-shadow(0 6px 18px rgba(0,0,0,.8)); }
      .char-stage svg { width:100%; height:auto; display:block; }
      .click-hint { font-size:.43rem; bottom:-22px; }

      /* button */
      .open-btn { font-size:1.1rem; letter-spacing:.12em; padding:.8rem 1.8rem; margin-top:2rem; }
      .source { font-size:.42rem; }
      .counter { font-size:.4rem; }

      /* card portal sizing + scroll on tall content */
      .card-portal { width:min(480px,96vw); }
      .card-portal.landed { max-height:88vh; overflow-y:auto; border-radius:0; }

      /* doc card */
      .card-bar { font-size:.62rem; padding:.4rem .85rem; }
      .card-body { padding:1rem 1rem 1.4rem; }
      .eyebrow { font-size:.42rem; }
      .headline { font-size:clamp(1.1rem,5.5vw,1.8rem); margin-bottom:.7rem; min-height:auto; }
      .meta { gap:.6rem; font-size:.44rem; }
      .preview { font-size:.68rem; line-height:1.6; margin-bottom:1.1rem; }
      .cta { font-size:.52rem; padding:.6rem 1.2rem; }

      /* vid card */
      .vid-body { padding:.9rem 1rem 1.3rem; }
      .vid-title { font-size:clamp(1rem,5vw,1.6rem); }
      .vid-meta { font-size:.42rem; gap:.6rem; }
      .vid-desc { font-size:.62rem; margin-bottom:1rem; }
    }

    @media (max-width: 380px) {
      .char-stage { width:min(170px,80vw); }
      h1 { font-size:clamp(2.4rem,16vw,3.5rem); }
      .card-portal { width:98vw; }
    }
  </style>
</head>

let opens = 0, busy = false

function getMouth() {
  const svg = document.getElementById('charSvg')
  const r = svg.getBoundingClientRect()
  // Jaw starts at y≈225 in 380px viewBox → ~59%
  return { x: r.left + r.width * 0.5, y: r.top + r.height * 0.607 }
}

function openFiles() {
  if (busy) return
  busy = true
  document.getElementById('charStage').classList.add('open')
  setTimeout(() => {
    const f = FILES[Math.floor(Math.random() * FILES.length)]
    spawnCard(f)
    opens++
    document.getElementById('counter').textContent =
      `FILES OPENED: ${opens} — ARCHIVE: ${FILES.length} ENTRIES`
  }, 380)
}

function spawnCard(f) {
  const { x, y } = getMouth()
  const portal = document.getElementById('cardPortal')
  const backdrop = document.getElementById('backdrop')

  portal.style.cssText = `--mx:${x}px; --my:${y}px; left:${x}px; top:${y}px;`
  portal.innerHTML = f.type === 'vid' ? buildVid(f) : buildDoc(f)
  portal.classList.remove('fly-out','landed')
  portal.offsetWidth // reflow

  portal.classList.add('fly-out')
  backdrop.classList.add('visible')

  portal.addEventListener('animationend', () => {
    portal.classList.add('landed')
    portal.style.left = '50vw'
    portal.style.top  = '50vh'
    if (f.type === 'doc') typeHead(f.head)
  }, { once: true })
}

function closeCard() {
  const portal = document.getElementById('cardPortal')
  document.getElementById('backdrop').classList.remove('visible')
  portal.classList.remove('fly-out','landed')
  portal.innerHTML = ''
  portal.style.cssText = ''
  document.getElementById('charStage').classList.remove('open')
  busy = false
}

document.addEventListener('click', e => {
  if (e.target.classList.contains('close-btn')) closeCard()
})

function buildDoc(f) {
  const body = f.body.replace(/\[REDACTED\]/g,'<span class="redact">[REDACTED]</span>')
  return `<div class="doc-card">
    <div class="card-bar"><span>${f.cat}</span><button class="close-btn">✕</button></div>
    <div class="card-body">
      <div class="eyebrow">Declassified Court Document</div>
      <div class="headline" id="typedHead"></div>
      <div class="meta"><span>${f.date}</span><span>${f.src}</span></div>
      <div class="preview">${body}</div>
      <a class="cta" href="${f.url}" target="_blank" rel="noopener">VIEW ARCHIVE →</a>
    </div>
  </div>`
}

function buildVid(f) {
  return `<div class="vid-card">
    <div class="card-bar"><span>VIDEO EVIDENCE · ${f.cat}</span><button class="close-btn">✕</button></div>
    <div class="vid-thumb">
      <iframe src="https://www.youtube.com/embed/${f.vid}?rel=0"
        allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
        allowfullscreen></iframe>
    </div>
    <div class="vid-body">
      <div class="vid-title">${f.head}</div>
      <div class="vid-meta"><span>${f.date}</span><span>${f.src}</span></div>
      <div class="vid-desc">${f.desc}</div>
      <a class="cta" href="https://jmail.world/" target="_blank" rel="noopener">FULL ARCHIVE →</a>
    </div>
  </div>`
}

function typeHead(text) {
  const el = document.getElementById('typedHead')
  if (!el) return
  el.textContent = ''
  let i = 0
  const tick = () => {
    if (!el.isConnected) return
    if (i < text.length) { el.textContent += text[i++]; setTimeout(tick, 24 + Math.random()*14) }
  }
  tick()
}
